
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amrit | Web Developer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  font-family: 'Segoe UI', sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#0a0a0a;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  position:sticky;

  top:0;
  z-index:1000;
}

nav h2{
  color:#00ff99;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#00ff99;
}

/* HERO */
.hero{

  height:100vh;
  background:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.hero-content{
  position:relative;
}

.hero h1{
  font-size:55px;
}

.hero span{
  color:#00ff99;
}

.hero p{
  margin-top:10px;
  font-size:18px;
}

.btn{
  background:#00ff99;
  color:black;
  padding:12px 25px;

  border:none;
  margin-top:20px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:white;
}

/* SECTION */
section{
  padding:80px 20px;
  text-align:center;
}

/* PROJECTS */
.projects{
  display:flex;

  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  width:260px;
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:160px;

  object-fit:cover;
  border-radius:10px;
}

/* CONTACT */
#contact p{
  margin:10px 0;
}

/* FOOTER */
footer{
  background:black;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

    </div>

    <div class="card">

      <h3>Coaching Website</h3>

</section>

<!-- CONTACT -->
<section id="contact">

</body>
</html>
